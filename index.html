<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Annotator V2</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="landing-page">
        <div class="landing-card">
            <h2>AI Annotator V2</h2>
            <button class="btn" id="btn-create-project">Create New Project</button>
            <button class="btn btn-secondary" id="btn-open-project">Open Existing Project</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div class="header-group">
                <button class="btn btn-secondary" style="padding: 6px 12px; margin:0;" id="btn-reset">Reset</button>
                <button class="btn" style="padding: 6px 16px; margin:0;" id="btn-save">Save Data</button>
            </div>
            <div class="header-group">
                <button class="btn btn-secondary" style="padding: 6px 12px; margin:0;" id="btn-text-mode" title="Require keyboard input after drawing">Text Mode: OFF</button>
                <button class="btn btn-secondary" style="padding: 6px 12px; margin:0;" id="btn-hide-current" title="Temporarily hide all labels on screen">Hide Current</button>
                
                <div class="dropdown">
                    <button class="btn btn-secondary" style="padding: 6px 12px; margin:0;" id="btn-review-labels">Review Labels ▾</button>
                    <div class="dropdown-content" id="review-dropdown">
                        <input type="text" id="review-search" placeholder="Search categories..." style="width: 100%; padding: 5px; margin-bottom: 5px;">
                        <label><input type="checkbox" id="review-select-all" checked> Select All</label>
                        <div id="review-category-list"></div>
                    </div>
                </div>
            </div>
            <div class="header-group">
                <button class="btn btn-secondary" style="padding: 6px 12px; margin:0;" id="btn-theme-toggle">☀️ Light Mode</button>
            </div>
        </header>

        <div class="workspace">
            <aside class="left-tools" id="left-panel">
                <div class="tool-icon active" id="tool-rect" title="Draw Rectangle">Rect</div>
                <div class="tool-icon" id="tool-circ" title="Draw Circle">Circ</div>
                <div class="tool-icon" id="tool-brush" title="Paint Mask">Brush</div> 
                <div class="tool-icon" id="tool-blur" title="Blur Sensitive Info (Destructive)">Blur</div>
                <div class="tool-icon" id="tool-resize" title="Resize Tool">Resize</div>
                <div class="tool-icon" id="tool-erase" title="Erase Tool">Erase</div>
                <div class="tool-icon" id="tool-select" title="Select Tool">Select</div>
            </aside>

            <div class="resizer" id="resizer-left"></div>

            <main class="center-area" id="drop-zone" style="position: relative;">
                <div class="canvas-container" id="canvas-container">
                    <div class="upload-overlay" id="upload-overlay">
                        <h2 title="Click or Drag & Drop Images">⊕</h2>
                        <p style="margin-top: 10px; color: var(--text-muted);">Click or Drag & Drop Images</p>
                    </div>
                    <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                    <canvas id="main-canvas" style="display:none;"></canvas>
                    
                    <div id="inline-input-container">
                        <input type="text" id="inline-input" placeholder="Type label..." autocomplete="off">
                        <ul id="inline-dropdown"></ul>
                    </div>
                </div>
                <div class="bottom-toolbar">
                    <label style="margin-right: 10px; font-weight: 500;">Zoom:</label>
                    <button class="btn-zoom" id="btn-zoom-out">-</button>
                    <input type="range" id="zoom-slider" min="10" max="300" value="100">
                    <button class="btn-zoom" id="btn-zoom-in">+</button>
                    <span id="zoom-val" style="margin-left: 10px; width: 45px; text-align: right;">100%</span>
                </div>
            </main>

            <div class="resizer" id="resizer-right"></div>

            <aside class="right-panels" id="right-panel">
                <div class="panel">
                    <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>Solution Explorer</span>
                        <button id="btn-close-project" class="btn btn-secondary" style="margin: 0; padding: 2px 8px; font-size: 11px;" title="Save & Close Project">Close ✖</button>
                    </div>
                    <div class="panel-content">
                        <input type="text" id="cat-search" placeholder="Search categories..." style="width: 100%; padding: 5px; margin-bottom: 10px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px;">
                        <div id="project-tree"><i style="color: var(--text-muted);">No project loaded.</i></div>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>Images</span>
                        <button id="btn-add-images" class="btn btn-secondary" style="margin: 0; padding: 2px 8px; font-size: 11px;" title="Add More Images">Add ➕</button>
                    </div>
                    <div class="panel-content" id="image-list" style="padding: 0;">
                        <div style="padding: 15px;"><i style="color: var(--text-muted);">No images available.</i></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
